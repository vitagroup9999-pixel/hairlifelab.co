<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hairlife Lab</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #eef7f2 0%, #f7f7fb 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      text-align: center;
      color: #1f2a2a;
    }

    .wrap {
      padding: 24px;
      max-width: 720px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    p {
      margin: 8px 0;
      font-size: 18px;
      color: #5b6666;
      line-height: 1.6;
    }

    .subtle {
      margin-top: 18px;
      font-size: 14px;
      color: #8a9494;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }

      .subtle {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>HAIRLIFE LAB</h1>
    <p>Scalp care innovation from Korea.</p>
    <p>Our website is currently under construction.</p>
    <div class="subtle">Launching Soon</div>
  </div>
</body>
</html>
